# Server Configuration
server.port=8082

# Database Configuration (H2 for dev)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Fix LocalDateTime serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.deserialization.fail-on-unknown-properties=false

# JWT Configuration
app.jwtSecret=mySecretKeyForJWTTokenGenerationAndValidationWithMinimumLength32Characters
app.jwtExpirationMs=86400000
app.jwtRefreshExpirationMs=604800000

# AI Service Configuration (use service name in Docker, localhost in dev)
ai.service.url=http://localhost:5000

# Logging
logging.level.root=INFO
logging.level.com.aijobmatcher=DEBUG

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB